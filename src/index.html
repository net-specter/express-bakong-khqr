<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bakong KHQR Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .qr-container {
        position: relative;
        display: inline-block;
      }
      .countdown-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(220, 38, 38, 0.9);
        color: white;
        padding: 6px 12px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 14px;
        min-width: 50px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
      .countdown-badge.warning {
        background: rgba(245, 158, 11, 0.9);
      }
      .countdown-badge.safe {
        background: rgba(34, 197, 94, 0.9);
      }
      .fade-in {
        animation: fadeIn 0.3s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .ring-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
      <div class="mb-8">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">
          Bakong KHQR Payment
        </h1>
        <p class="text-gray-600">Fast and secure payment with QR code</p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white rounded-lg shadow-lg p-8">
          <h2 class="text-2xl font-bold text-gray-800 mb-6">Payment Details</h2>

          <div class="mb-6">
            <label class="block text-gray-700 font-semibold mb-2">Amount</label>
            <div class="flex gap-3">
              <input
                type="number"
                id="amountInput"
                placeholder="Enter amount"
                class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                min="0.01"
                step="0.01"
                value="100"
              />
              <select
                id="currencyInput"
                class="w-42 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
              >
                <option value="KHR">KHR - Riel</option>
                <option value="USD">USD - Dollar</option>
              </select>
            </div>
          </div>

          <button
            id="createQrBtn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 mb-6"
          >
            Generate QR Code
          </button>

          <div class="bg-gray-50 rounded-lg p-6 mb-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">
              Transaction Status
            </h3>
            <div id="statusContainer" class="hidden">
              <div class="mb-4">
                <p class="text-sm text-gray-600">MD5 Hash:</p>
                <p
                  id="md5Display"
                  class="text-sm font-mono bg-white p-2 rounded border border-gray-200 break-all"
                ></p>
              </div>
              <button
                id="checkStatusBtn"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200"
              >
                Check Payment Status
              </button>
              <div id="statusResult" class="mt-4 text-sm hidden"></div>
            </div>
            <p id="noTransactionMsg" class="text-gray-500 text-center">
              No active transaction
            </p>
          </div>

          <div
            id="errorMessage"
            class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"
          ></div>

          <div id="loadingIndicator" class="hidden text-center">
            <div
              class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"
            ></div>
            <p class="text-gray-600 ml-2 inline">Generating QR code...</p>
          </div>
        </div>

        <div
          class="bg-white rounded-lg shadow-lg p-8 flex flex-col items-center justify-center min-h-96"
        >
          <div id="qrCodeSection" class="hidden text-center fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Scan to Pay</h2>
            <div class="qr-container bg-gray-50 p-8 rounded-lg inline-block">
              <img
                id="qrImage"
                src=""
                alt="QR Code"
                class="w-96 h-96 object-contain"
              />
              <div id="countdownBadge" class="countdown-badge safe">3:00</div>
            </div>
            <p class="text-gray-600 text-sm mt-4">
              Scan with Bakong app to complete payment
            </p>
          </div>

          <div id="emptyState" class="text-center">
            <div class="text-6xl mb-4">📱</div>
            <p class="text-gray-500">
              Enter amount and generate QR code to start payment
            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_ENDPOINT = "/api/v1/payments/initiate-payment";
      const CHECK_STATUS_ENDPOINT = "/api/v1/payments/check-status";
      let countdownInterval = null;
      let currentMd5 = null;
      const COUNTDOWN_DURATION = 3 * 60;

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, "0")}`;
      }

      function startCountdown() {
        let remainingTime = COUNTDOWN_DURATION;
        const badge = document.getElementById("countdownBadge");

        if (countdownInterval) clearInterval(countdownInterval);

        countdownInterval = setInterval(() => {
          remainingTime--;
          badge.textContent = formatTime(remainingTime);

          if (remainingTime <= 60) {
            badge.classList.remove("safe");
            badge.classList.add("warning");
          }

          if (remainingTime <= 0) {
            clearInterval(countdownInterval);
            badge.textContent = "Expired";
            badge.classList.remove("warning");
            badge.classList.add("warning");
            alert(
              "⏱️ QR Code Timeout\n\nThe QR code has expired. Please generate a new one.",
            );
            resetQRDisplay();
          }
        }, 1000);
      }

      function resetQRDisplay() {
        document.getElementById("qrCodeSection").classList.add("hidden");
        document.getElementById("emptyState").classList.remove("hidden");
        document.getElementById("statusContainer").classList.add("hidden");
        document.getElementById("noTransactionMsg").classList.remove("hidden");
        currentMd5 = null;
        if (countdownInterval) clearInterval(countdownInterval);
      }

      document
        .getElementById("createQrBtn")
        .addEventListener("click", async () => {
          const amount = document.getElementById("amountInput").value;
          const currency = document.getElementById("currencyInput").value;
          const errorMsg = document.getElementById("errorMessage");
          const loadingInd = document.getElementById("loadingIndicator");

          // Validation
          if (!amount || amount <= 0) {
            errorMsg.textContent = "⚠️ Please enter a valid amount";
            errorMsg.classList.remove("hidden");
            return;
          }

          errorMsg.classList.add("hidden");
          loadingInd.classList.remove("hidden");

          try {
            const response = await fetch(API_ENDPOINT, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ amount: parseFloat(amount), currency }),
            });

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.error || "Failed to generate QR code");
            }

            currentMd5 = data.md5Hash;
            // qrStand already contains full data:image/png;base64,... URL from API
            document.getElementById("qrImage").src = data.qrStand;
            document.getElementById("qrCodeSection").classList.remove("hidden");
            document.getElementById("emptyState").classList.add("hidden");
            document
              .getElementById("statusContainer")
              .classList.remove("hidden");
            document.getElementById("noTransactionMsg").classList.add("hidden");
            document.getElementById("md5Display").textContent = data.md5Hash;

            startCountdown();

            loadingInd.classList.add("hidden");
          } catch (error) {
            errorMsg.textContent = `❌ Error: ${error.message}`;
            errorMsg.classList.remove("hidden");
            loadingInd.classList.add("hidden");
          }
        });

      document
        .getElementById("checkStatusBtn")
        .addEventListener("click", async () => {
          if (!currentMd5) {
            alert("No active transaction");
            return;
          }

          try {
            const response = await fetch(
              `${CHECK_STATUS_ENDPOINT}/${currentMd5}`,
              {
                method: "GET",
                headers: {
                  "Content-Type": "application/json",
                },
              },
            );

            const data = await response.json();
            const statusResult = document.getElementById("statusResult");

            statusResult.classList.remove("hidden");

            if (data.status === "COMPLETED") {
              const detail = data.detail || {};
              statusResult.innerHTML = `
              <div class="bg-gradient-to-br from-green-50 to-emerald-50 border-2 border-green-400 rounded-lg p-6 shadow-lg">
                <div class="flex items-center justify-center mb-6">
                  <div class="text-4xl">✅</div>
                  <h3 class="text-2xl font-bold text-green-700 ml-3">Payment Successful!</h3>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                  <div class="bg-white rounded-lg p-4 border border-green-200">
                    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-1">From Account</p>
                    <p class="text-sm font-mono text-gray-800 break-all">${detail.fromAccountId || "N/A"}</p>
                  </div>
                  
                  <div class="bg-white rounded-lg p-4 border border-green-200">
                    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-1">To Account</p>
                    <p class="text-sm font-mono text-gray-800 break-all">${detail.toAccountId || "N/A"}</p>
                  </div>
                  
                  <div class="bg-white rounded-lg p-4 border border-green-200">
                    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-1">Amount</p>
                    <p class="text-lg font-bold text-green-600">${detail.amount || "N/A"} <span class="text-sm">${detail.currency || "N/A"}</span></p>
                  </div>
                  
                  <div class="bg-white rounded-lg p-4 border border-green-200">
                    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-1">Transaction ID</p>
                    <p class="text-sm font-mono font-bold text-gray-800">${detail.externalRef || "N/A"}</p>
                  </div>
                </div>
                
                <div class="bg-white rounded-lg p-4 border border-green-200">
                  <p class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-2">Transaction Hash</p>
                  <p class="text-xs font-mono text-gray-700 break-all bg-gray-50 p-3 rounded">${detail.hash || "N/A"}</p>
                </div>
              </div>
            `;
              setTimeout(() => resetQRDisplay(), 3000);
            } else if (data.status === "FAILED") {
              statusResult.innerHTML = `
              <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                <strong>❌ Payment Failed</strong><br>
                Message: ${data.message || "Unknown error"}
              </div>
            `;
            } else {
              statusResult.innerHTML = `
              <div class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded">
                <strong>⏳ Pending</strong><br>
                Status: ${data.status || "Waiting for payment"}
              </div>
            `;
            }
          } catch (error) {
            const statusResult = document.getElementById("statusResult");
            statusResult.classList.remove("hidden");
            statusResult.innerHTML = `
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
              <strong>Error:</strong> ${error.message}
            </div>
          `;
          }
        });

      document
        .getElementById("amountInput")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            document.getElementById("createQrBtn").click();
          }
        });
    </script>
  </body>
</html>
